  <script>
    // 处理侧栏链接的活跃状态
    function updateActiveSidebarLink() {
      const sections = document.querySelectorAll('.content section');
      const links = document.querySelectorAll('.sidebar a');
      
      sections.forEach(section => {
        const top = section.offsetTop;
        const height = section.offsetHeight;
        const scrollPosition = window.scrollY + 100;
        
        if (scrollPosition >= top && scrollPosition < top + height) {
          links.forEach(link => {
            link.classList.remove('active');
          });
          const activeLink = document.querySelector(`.sidebar a[href="#${section.id}"]`);
          if (activeLink) {
            activeLink.classList.add('active');
          }
        }
      });
    }

    window.addEventListener('scroll', updateActiveSidebarLink);
    window.addEventListener('load', updateActiveSidebarLink);

    // 原有的导航脚本
    $("#nav a").on("click", function () {
      var position = $(this).parent().position();
      var width = $(this).parent().width();
      $("#nav .slide1").css({
        opacity: 1,
        left: +position.left,
        width: width,
      });
    });
    $("#nav a").on("mouseover", function () {
      var position = $(this).parent().position();
      var width = $(this).parent().width();
      $("#nav .slide2")
        .css({ opacity: 1, left: +position.left, width: width })
        .addClass("squeeze");
    });
    $("#nav a").on("mouseout", function () {
      var position = $(this).parent().position();
      var width = $(this).parent().width();
      $("#nav .slide2").css({ opacity: 0 }).removeClass("squeeze");
    });
    var currentWidth = $("#nav li:nth-of-type(3) a").parent("li").width();
    var current = $("li:nth-of-type(3) a").position();
    $("#nav .slide1").css({ left: +current.left, width: currentWidth });

    // Contact functions for hover popup
    function showContact() {
      document.getElementById('contactPopup').classList.remove('hidden');
    }

    function hideContact() {
      document.getElementById('contactPopup').classList.add('hidden');
    }</script>
